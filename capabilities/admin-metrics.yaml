naftiko: 1.0.0-alpha2
info:
  label: Open Liberty Admin REST API — Metrics
  description: 'Open Liberty Admin REST API — Metrics. 4 operations. Lead operation: Get all metrics. Self-contained Naftiko
    capability covering one Open Liberty business surface.'
  tags:
  - Open Liberty
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_LIBERTY_API_KEY: OPEN_LIBERTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-metrics
    baseUri: https://localhost:9443
    description: Open Liberty Admin REST API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: metrics
      path: /metrics
      operations:
      - name: getallmetrics
        method: GET
        description: Get all metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
          description: Response format.
    - name: metrics-application
      path: /metrics/application
      operations:
      - name: getapplicationmetrics
        method: GET
        description: Get application metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics-base
      path: /metrics/base
      operations:
      - name: getbasemetrics
        method: GET
        description: Get base metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics-vendor
      path: /metrics/vendor
      operations:
      - name: getvendormetrics
        method: GET
        description: Get vendor metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.OPEN_LIBERTY_USER}}'
      password: '{{env.OPEN_LIBERTY_PASS}}'
  exposes:
  - type: rest
    namespace: admin-metrics-rest
    port: 8080
    description: REST adapter for Open Liberty Admin REST API — Metrics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/metrics
      name: metrics
      description: REST surface for metrics.
      operations:
      - method: GET
        name: getallmetrics
        description: Get all metrics
        call: admin-metrics.getallmetrics
        with:
          Accept: rest.Accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/application
      name: metrics-application
      description: REST surface for metrics-application.
      operations:
      - method: GET
        name: getapplicationmetrics
        description: Get application metrics
        call: admin-metrics.getapplicationmetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/base
      name: metrics-base
      description: REST surface for metrics-base.
      operations:
      - method: GET
        name: getbasemetrics
        description: Get base metrics
        call: admin-metrics.getbasemetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/vendor
      name: metrics-vendor
      description: REST surface for metrics-vendor.
      operations:
      - method: GET
        name: getvendormetrics
        description: Get vendor metrics
        call: admin-metrics.getvendormetrics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Liberty Admin REST API — Metrics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-all-metrics
      description: Get all metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-metrics.getallmetrics
      with:
        Accept: tools.Accept
      outputParameters:
      - type: object
        mapping: $.
    - name: get-application-metrics
      description: Get application metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-metrics.getapplicationmetrics
      outputParameters:
      - type: object
        mapping: $.
    - name: get-base-metrics
      description: Get base metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-metrics.getbasemetrics
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vendor-metrics
      description: Get vendor metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-metrics.getvendormetrics
      outputParameters:
      - type: object
        mapping: $.
